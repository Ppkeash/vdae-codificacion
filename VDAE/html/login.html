<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VDAE - Inicio de Sesión</title>
    <link rel="stylesheet" href="/estilos/styles.css">
</head>
<body>
    <header>
        <div class="logo">
            <img src="/estilos/logo-no-background.png" alt="VDAE Logo">
        </div>
        <nav>
            <ul class="main-nav">
                <li><a href="/html/index.html">Inicio</a></li>
                <li><a href="#">Catalogo</a></li>
                <li><a href="/html/contacto.html">Contacto</a></li>
            </ul>
            <ul class="auth-nav">
                <li><a href="/html/login.html">Login</a></li>
                <li><a href="/html/registro.html">Registro</a></li>
            </ul>
            <div class="search-cart">
                <img src="/estilos/lupa.png"alt = Buscar">
                <img src="/estilos/carrito-de-compras.png" alt="Carrito">
            </div>
        </nav>
    </header>
    <main>
        <section class="login">
            <h1>INICIO DE SESION VDAE</h1>
            <form>
                <div class="form-group">
                    <input type="email" id="email" name="email" placeholder="E-mail">
                </div>
                <div class="form-group">
                    <input type="password" id="password" name="password" placeholder="Contraseña">
                </div>
                <button type="submit">Iniciar Sesión</button>
            </form>
            <div class="forgot-register">
                <div class="forgot-password">
                    <a href="#">¿Olvidó su contraseña? Cámbiela <span>Aquí</span></a>
                </div>
                <div class="register">
                    <p>¿No tiene una cuenta? <a href="#">Regístrese <span>Aquí</span></a></p>
                </div>
            </div>
        </section>
    </main>
    
</body>
</html>
